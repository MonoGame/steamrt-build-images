name: Build and publish SteamRT image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/monogame/steamrt-sniper-premake
  PREMAKE_REF: v5.0.0-beta8

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
            base_image: registry.gitlab.steamos.cloud/steamrt/sniper/sdk:latest

          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            base_image: registry.gitlab.steamos.cloud/steamrt/sniper/sdk/arm64:latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Pull requests are built but not published, so they do not need to log in.
      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
          build-args: |
            BASE_IMAGE=${{ matrix.base_image }}
            PREMAKE_REF=${{ env.PREMAKE_REF }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}-${{ matrix.arch }}
            ${{ env.IMAGE_NAME }}:${{ env.PREMAKE_REF }}-${{ matrix.arch }}
          cache-from: type=gha,scope=steamrt-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=steamrt-${{ matrix.arch }}

  publish-manifest:
    name: Publish multi-architecture image
    needs: build
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create multi-architecture image
        run: |
          docker buildx imagetools create \
            --tag "${IMAGE_NAME}:${GITHUB_SHA}" \
            --tag "${IMAGE_NAME}:${PREMAKE_REF}" \
            --tag "${IMAGE_NAME}:latest" \
            "${IMAGE_NAME}:${GITHUB_SHA}-amd64" \
            "${IMAGE_NAME}:${GITHUB_SHA}-arm64"

      - name: Inspect published image
        run: |
          docker buildx imagetools inspect \
            "${IMAGE_NAME}:${PREMAKE_REF}"
